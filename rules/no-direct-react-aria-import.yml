id: no-direct-react-aria-import
language: Tsx
severity: error
message: Import react-aria-components from @greppa/ui instead of using it directly.
note: All React Aria primitives must be re-exported through packages/ui.
files:
  - 'packages/**/*.ts'
  - 'packages/**/*.tsx'
ignores:
  - 'packages/ui/**'
  - '**/*.test.ts'
  - '**/*.test.tsx'
  # Known violation — will be migrated to @greppa/ui Tree component
  - 'packages/web/src/components/FileTree/FileTree.tsx'
rule:
  kind: import_statement
  has:
    stopBy: end
    kind: string_fragment
    regex: ^react-aria-components$

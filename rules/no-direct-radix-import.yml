id: no-direct-radix-import
language: Tsx
severity: error
message: Import @radix-ui/* from @greppa/ui instead of using it directly.
note: All Radix UI primitives must be re-exported through packages/ui.
files:
  - 'packages/**/*.ts'
  - 'packages/**/*.tsx'
ignores:
  - 'packages/ui/**'
  - '**/*.test.ts'
  - '**/*.test.tsx'
  # Known violation — will be migrated to @greppa/ui Tabs component
  - 'packages/web/src/components/DetailPanel/DetailPanel.tsx'
rule:
  kind: import_statement
  has:
    stopBy: end
    kind: string_fragment
    regex: ^@radix-ui/
